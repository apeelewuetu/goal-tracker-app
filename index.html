<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Over 0.5 Goal Tracker - Live Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --card-border: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-green: #10b981;
            --accent-green-bg: rgba(16, 185, 129, 0.15);
            --accent-yellow: #f59e0b;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            line-height: 1.5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        h1 span {
            color: var(--accent-green);
        }

        .api-banner {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }

        .api-input-group {
            display: flex;
            gap: 8px;
            flex-grow: 1;
            max-width: 600px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat-card .label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-card .value {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .value.highlight-green {
            color: var(--accent-green);
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-green);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .controls {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            justify-content: space-between;
        }

        .control-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        input[type="text"], input[type="password"], select {
            background-color: var(--bg-color);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--accent-blue);
        }

        .btn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .table-container {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: rgba(15, 23, 42, 0.6);
            padding: 14px 16px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--card-border);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--card-border);
            font-size: 0.95rem;
        }

        tr.row-good {
            background-color: var(--accent-green-bg);
            border-left: 4px solid var(--accent-green);
        }

        tr.row-yellow {
            background-color: rgba(245, 158, 11, 0.05);
        }

        tr.row-red {
            background-color: rgba(239, 68, 68, 0.05);
        }

        .odds-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 1rem;
        }

        .odds-green { background-color: var(--accent-green); color: #000; }
        .odds-yellow { background-color: var(--accent-yellow); color: #000; }
        .odds-red { background-color: var(--accent-red); color: #fff; }

        .badge-opportunity {
            background-color: var(--accent-green);
            color: #000;
            font-size: 0.75rem;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            animation: flash 1s infinite alternate;
            display: inline-block;
            margin-left: 8px;
        }

        @keyframes flash {
            from { opacity: 1; }
            to { opacity: 0.4; }
        }

        .half-indicator {
            font-size: 0.8rem;
            padding: 2px 6px;
            border-radius: 4px;
            background-color: var(--card-border);
            color: var(--text-secondary);
        }

        .score {
            font-weight: 700;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr {
                margin-bottom: 16px;
                border: 1px solid var(--card-border);
                border-radius: 12px;
                padding: 12px;
                background-color: var(--card-bg);
            }
            td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 8px 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }
            td::before {
                content: attr(data-label);
                font-size: 0.8rem;
                color: var(--text-secondary);
                text-transform: uppercase;
                font-weight: 600;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Over 0.5 <span>Goal Tracker</span></h1>
            <button id="btn-notify" class="btn">Enable Audio/Browser Alerts</button>
        </header>

        <div class="api-banner">
            <div class="api-input-group">
                <input type="password" id="api-key" placeholder="Enter API-Football (RapidAPI) Key..." style="flex-grow: 1;">
                <button id="btn-save-key" class="btn">Connect Live API</button>
            </div>
            <span id="api-status" style="font-size: 0.85rem; color: var(--text-secondary);">Mode: Simulated Demo</span>
        </div>

        <section class="dashboard">
            <div class="stat-card">
                <span class="label">Total Live Matches</span>
                <span class="value" id="stat-total">0</span>
            </div>
            <div class="stat-card">
                <span class="label">Good Opportunities</span>
                <span class="value highlight-green" id="stat-opportunities">0</span>
            </div>
            <div class="stat-card">
                <span class="label">Current Time</span>
                <span class="value" id="stat-time">--:--:--</span>
            </div>
            <div class="stat-card">
                <span class="label">Auto Refresh</span>
                <div class="status-indicator" style="margin-top: auto;">
                    <div class="dot"></div>
                    <span id="stat-refresh">Active (30s)</span>
                </div>
            </div>
        </section>

        <section class="controls">
            <div class="control-group">
                <input type="text" id="search-input" placeholder="Search team or league...">
                <select id="filter-league">
                    <option value="ALL">All Leagues</option>
                    <option value="Premier League">Premier League</option>
                    <option value="La Liga">La Liga</option>
                    <option value="Serie A">Serie A</option>
                    <option value="Bundesliga">Bundesliga</option>
                    <option value="Ligue 1">Ligue 1</option>
                </select>
            </div>
            <div class="control-group">
                <label for="sort-select" style="font-size: 0.9rem; color: var(--text-secondary);">Sort by:</label>
                <select id="sort-select">
                    <option value="minute-desc">Match Minute (High to Low)</option>
                    <option value="odds-asc">Over 0.5 Odds (Low to High)</option>
                    <option value="league-asc">League (A-Z)</option>
                </select>
            </div>
        </section>

        <section class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>League</th>
                        <th>Match</th>
                        <th>Score</th>
                        <th>Time</th>
                        <th>Half</th>
                        <th>Over 0.5 Odds</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="matches-tbody">
                </tbody>
            </table>
        </section>
    </div>

    <script>
        let audioEnabled = false;
        let notifiedMatches = new Set();
        let apiKey = localStorage.getItem('API_FOOTBALL_KEY') || '';
        let liveMatches = [];

        const tbody = document.getElementById('matches-tbody');
        const searchInput = document.getElementById('search-input');
        const filterLeague = document.getElementById('filter-league');
        const sortSelect = document.getElementById('sort-select');
        const statTotal = document.getElementById('stat-total');
        const statOpportunities = document.getElementById('stat-opportunities');
        const statTime = document.getElementById('stat-time');
        const btnNotify = document.getElementById('btn-notify');
        const apiKeyInput = document.getElementById('api-key');
        const btnSaveKey = document.getElementById('btn-save-key');
        const apiStatus = document.getElementById('api-status');

        if (apiKey) {
            apiKeyInput.value = apiKey;
            apiStatus.textContent = "Mode: Live API Connected";
            apiStatus.style.color = "var(--accent-green)";
        }

        btnSaveKey.addEventListener('click', () => {
            apiKey = apiKeyInput.value.trim();
            localStorage.setItem('API_FOOTBALL_KEY', apiKey);
            if (apiKey) {
                apiStatus.textContent = "Mode: Live API Connected";
                apiStatus.style.color = "var(--accent-green)";
                fetchLiveMatches();
            } else {
                apiStatus.textContent = "Mode: Simulated Demo";
                apiStatus.style.color = "var(--text-secondary)";
            }
        });

        function playBeep() {
            if (!audioEnabled) return;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            } catch (e) {}
        }

        function triggerDesktopNotification(match) {
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification("GOOD OPPORTUNITY DETECTED!", {
                    body: `${match.home} vs ${match.away} (${match.league})\nTime: ${match.minute}' | Odds: ${match.odds.toFixed(2)}`
                });
            }
        }

        btnNotify.addEventListener('click', () => {
            audioEnabled = true;
            if ("Notification" in window && Notification.permission !== "granted") {
                Notification.requestPermission();
            }
            btnNotify.textContent = "Alerts Active";
            btnNotify.style.backgroundColor = "var(--accent-green)";
            btnNotify.style.color = "#000";
        });

        async function fetchLiveMatches() {
            if (!apiKey) {
                runDemoSimulation();
                return;
            }

            try {
                const response = await fetch('https://api-football-v1.p.rapidapi.com/v3/fixtures?live=all', {
                    headers: {
                        'X-RapidAPI-Key': apiKey,
                        'X-RapidAPI-Host': 'api-football-v1.p.rapidapi.com'
                    }
                });

                const data = await response.json();
                if (data.response) {
                    liveMatches = data.response.map(item => {
                        const elapsed = item.fixture.status.elapsed || 0;
                        const shortStatus = item.fixture.status.short;
                        let halfText = "1st Half";
                        if (shortStatus === "2H" || elapsed > 45) halfText = "2nd Half";
                        if (shortStatus === "HT") halfText = "Halftime";

                        let estimatedOdds = 1.05 + (elapsed * 0.0035);

                        return {
                            id: item.fixture.id,
                            league: item.league.name,
                            home: item.teams.home.name,
                            away: item.teams.away.name,
                            homeScore: item.goals.home ?? 0,
                            awayScore: item.goals.away ?? 0,
                            minute: elapsed,
                            half: halfText,
                            odds: parseFloat(estimatedOdds.toFixed(2)),
                            status: "Live"
                        };
                    });
                    renderMatches();
                }
            } catch (err) {
                console.error("API Fetch Error:", err);
            }
        }

        function isGoodOpportunity(match) {
            return match.half === "1st Half" && 
                   match.homeScore === 0 && 
                   match.awayScore === 0 && 
                   match.minute >= 15 && 
                   match.minute <= 35 && 
                   match.odds >= 1.15 && 
                   match.odds <= 1.20;
        }

        function renderMatches() {
            let filtered = liveMatches.filter(m => {
                const leagueMatch = filterLeague.value === "ALL" || m.league.includes(filterLeague.value);
                const searchTxt = searchInput.value.toLowerCase();
                const searchMatch = m.home.toLowerCase().includes(searchTxt) || 
                                    m.away.toLowerCase().includes(searchTxt) || 
                                    m.league.toLowerCase().includes(searchTxt);
                return leagueMatch && searchMatch;
            });

            const sortVal = sortSelect.value;
            filtered.sort((a, b) => {
                if (sortVal === 'minute-desc') return b.minute - a.minute;
                if (sortVal === 'odds-asc') return a.odds - b.odds;
                if (sortVal === 'league-asc') return a.league.localeCompare(b.league);
                return 0;
            });

            statTotal.textContent = liveMatches.length;
            statOpportunities.textContent = liveMatches.filter(isGoodOpportunity).length;

            tbody.innerHTML = '';
            filtered.forEach(m => {
                const goodOpp = isGoodOpportunity(m);

                if (goodOpp && !notifiedMatches.has(m.id)) {
                    playBeep();
                    triggerDesktopNotification(m);
                    notifiedMatches.add(m.id);
                }

                const tr = document.createElement('tr');
                tr.className = goodOpp ? 'row-good' : (m.odds >= 1.10 && m.odds <= 1.25 ? 'row-yellow' : 'row-red');

                tr.innerHTML = `
                    <td data-label="League">${m.league}</td>
                    <td data-label="Match">
                        <strong>${m.home} vs ${m.away}</strong>
                        ${goodOpp ? '<span class="badge-opportunity">Good Opportunity</span>' : ''}
                    </td>
                    <td data-label="Score"><span class="score">${m.homeScore} - ${m.awayScore}</span></td>
                    <td data-label="Time">${m.minute}'</td>
                    <td data-label="Half"><span class="half-indicator">${m.half}</span></td>
                    <td data-label="Over 0.5 Odds">
                        <span class="odds-badge ${goodOpp ? 'odds-green' : (m.odds >= 1.10 && m.odds <= 1.25 ? 'odds-yellow' : 'odds-red')}">
                            ${m.odds.toFixed(2)}
                        </span>
                    </td>
                    <td data-label="Status">${m.status}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function runDemoSimulation() {
            if (liveMatches.length === 0) {
                liveMatches = [
                    { id: 1, league: "Premier League", home: "Arsenal", away: "Chelsea", homeScore: 0, awayScore: 0, minute: 28, half: "1st Half", odds: 1.18, status: "Live" },
                    { id: 2, league: "La Liga", home: "Real Madrid", away: "Barcelona", homeScore: 1, awayScore: 0, minute: 14, half: "1st Half", odds: 1.08, status: "Live" },
                    { id: 3, league: "Serie A", home: "AC Milan", away: "Inter", homeScore: 0, awayScore: 0, minute: 38, half: "1st Half", odds: 1.16, status: "Live" },
                    { id: 4, league: "Bundesliga", home: "Bayern Munich", away: "Dortmund", homeScore: 0, awayScore: 0, minute: 18, half: "1st Half", odds: 1.17, status: "Live" }
                ];
            } else {
                liveMatches.forEach(m => {
                    if (m.minute < 90) m.minute += 1;
                });
            }
            renderMatches();
        }

        function updateClock() {
            statTime.textContent = new Date().toLocaleTimeString();
        }

        searchInput.addEventListener('input', renderMatches);
        filterLeague.addEventListener('change', renderMatches);
        sortSelect.addEventListener('change', renderMatches);

        updateClock();
        setInterval(updateClock, 1000);

        fetchLiveMatches();
        setInterval(fetchLiveMatches, 30000);
    </script>
</body>
</html>
