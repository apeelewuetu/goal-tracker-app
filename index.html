<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Over 0.5 Goal Scanner Dashboard</title>
  <style>
    :root {
      --bg-dark: #0f172a;
      --card-bg: #1e293b;
      --card-border: #334155;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-green: #10b981;
      --accent-green-bg: rgba(16, 185, 129, 0.15);
      --accent-amber: #f59e0b;
      --accent-amber-bg: rgba(245, 158, 11, 0.15);
      --accent-red: #ef4444;
      --accent-red-bg: rgba(239, 68, 68, 0.15);
      --accent-blue: #3b82f6;
      --accent-purple: #a855f7;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      padding: 24px;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Top Action Bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 24px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .api-input-group {
      display: flex;
      gap: 10px;
      flex: 1;
      max-width: 500px;
    }

    .api-input-group input {
      flex: 1;
      background-color: var(--bg-dark);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      padding: 10px 14px;
      border-radius: 6px;
      outline: none;
      font-size: 14px;
    }

    .btn-primary {
      background-color: var(--accent-blue);
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .mode-badge {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 20px;
    }

    .stat-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
    }

    .stat-value.green {
      color: var(--accent-green);
    }

    .status-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--accent-green);
      margin-right: 6px;
    }

    /* Filters Bar */
    .filter-bar {
      display: flex;
      gap: 16px;
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px 8px 0 0;
      padding: 16px 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-bar input, .filter-bar select {
      background-color: var(--bg-dark);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }

    .sort-container {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text-muted);
    }

    /* Table */
    .table-container {
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-top: none;
      border-radius: 0 0 8px 8px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      background-color: rgba(15, 23, 42, 0.4);
      padding: 14px 20px;
      font-size: 12px;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 600;
      border-bottom: 1px solid var(--card-border);
    }

    td {
      padding: 16px 20px;
      border-bottom: 1px solid var(--card-border);
      font-size: 14px;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr.good-opportunity {
      background-color: var(--accent-green-bg);
      border-left: 4px solid var(--accent-green);
    }

    .match-team {
      font-weight: 600;
    }

    .badge-opp {
      background-color: var(--accent-green);
      color: #0f172a;
      font-size: 10px;
      font-weight: 800;
      padding: 3px 6px;
      border-radius: 4px;
      margin-left: 8px;
      text-transform: uppercase;
    }

    .badge-friendly {
      background-color: var(--accent-purple);
      color: #ffffff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 6px;
      text-transform: uppercase;
    }

    .half-tag {
      background-color: var(--bg-dark);
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    .odds-pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 13px;
    }

    .odds-pill.green {
      background-color: var(--accent-green);
      color: #0f172a;
    }

    .odds-pill.amber {
      background-color: var(--accent-amber);
      color: #0f172a;
    }

    .odds-pill.red {
      background-color: var(--accent-red);
      color: #ffffff;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="api-input-group">
        <input type="password" id="apiKeyInput" placeholder="Enter API-Football (RapidAPI) Key...">
        <button class="btn-primary" onclick="connectAPI()">Connect Live API</button>
      </div>
      <div class="mode-badge" id="modeBadge">Mode: Simulated Demo</div>
    </div>

    <!-- Stats Bar -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-title">Total Live Matches</div>
        <div class="stat-value" id="totalMatches">6</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">Good Opportunities</div>
        <div class="stat-value green" id="goodOpps">3</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">Current Time</div>
        <div class="stat-value" id="clock">00:00:00</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">Auto Refresh</div>
        <div class="stat-value" style="font-size: 16px; margin-top: 8px;">
          <span class="status-indicator"></span>Active (5m)
        </div>
      </div>
    </div>

    <!-- Filters Bar -->
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="Search team or league..." onkeyup="renderTable()">
      <select id="leagueFilter" onchange="renderTable()">
        <option value="ALL">All Leagues & Friendlies</option>
        <option value="FRIENDLIES_ONLY">⚡ Friendlies (Testing)</option>
        <option value="Premier League">Premier League</option>
        <option value="La Liga">La Liga</option>
        <option value="Serie A">Serie A</option>
        <option value="Bundesliga">Bundesliga</option>
        <option value="Ligue 1">Ligue 1</option>
      </select>
      <div class="sort-container">
        <label for="sortBy">Sort by:</label>
        <select id="sortBy" onchange="renderTable()">
          <option value="MINUTE_DESC">Match Minute (High to Low)</option>
          <option value="MINUTE_ASC">Match Minute (Low to High)</option>
          <option value="ODDS_DESC">Odds (High to Low)</option>
        </select>
      </div>
    </div>

    <!-- Matches Table -->
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>League</th>
            <th>Match</th>
            <th>Score</th>
            <th>Time</th>
            <th>Half</th>
            <th>Over 0.5 Odds</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="matchesBody">
          <!-- Rows render here dynamically -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    let activeApiKey = "";
    const RAPIDAPI_HOST = "free-api-live-football-data.p.rapidapi.com";
    const ENDPOINT_PATH = "football-current-live";

    // Standard list including Major Leagues + Friendlies
    const PRESET_LEAGUES = [
      "Premier League",
      "La Liga",
      "Serie A",
      "Bundesliga",
      "Ligue 1",
      "Club Friendly",
      "Int. Friendly"
    ];

    // Master Demo Data: Combines domestic leagues + active testing friendlies
    let matchesData = [
      { id: 1, league: "Club Friendly", home: "Manchester United", away: "Real Betis", homeScore: 0, awayScore: 0, elapsed: 28, odds: 1.18, isOpp: true, isFriendly: true },
      { id: 2, league: "Club Friendly", home: "Liverpool", away: "Sevilla", homeScore: 0, awayScore: 0, elapsed: 31, odds: 1.17, isOpp: true, isFriendly: true },
      { id: 3, league: "Int. Friendly", home: "Japan", away: "South Korea", homeScore: 0, awayScore: 0, elapsed: 19, odds: 1.15, isOpp: true, isFriendly: true },
      { id: 4, league: "Serie A", home: "AC Milan", away: "Inter", homeScore: 0, awayScore: 0, elapsed: 42, odds: 1.16, isOpp: false, isFriendly: false },
      { id: 5, league: "Premier League", home: "Arsenal", away: "Chelsea", homeScore: 1, awayScore: 0, elapsed: 32, odds: 1.08, isOpp: false, isFriendly: false },
      { id: 6, league: "La Liga", home: "Real Madrid", away: "Barcelona", homeScore: 0, awayScore: 1, elapsed: 18, odds: 1.07, isOpp: false, isFriendly: false }
    ];

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').innerText = now.toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();

    function populateLeagues() {
      const select = document.getElementById('leagueFilter');
      const apiLeagues = [...new Set(matchesData.map(m => m.league))];
      const combinedLeagues = [...new Set([...PRESET_LEAGUES, ...apiLeagues])];

      select.innerHTML = `
        <option value="ALL">All Leagues & Friendlies</option>
        <option value="FRIENDLIES_ONLY">⚡ Friendlies (Testing)</option>
      `;

      combinedLeagues.forEach(l => {
        select.innerHTML += `<option value="${l}">${l}</option>`;
      });
    }

    function renderTable() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const leagueFilter = document.getElementById('leagueFilter').value;
      const sortBy = document.getElementById('sortBy').value;

      let filtered = matchesData.filter(m => {
        const matchesSearch = m.home.toLowerCase().includes(search) || 
                              m.away.toLowerCase().includes(search) || 
                              m.league.toLowerCase().includes(search);
        
        let matchesLeague = true;
        if (leagueFilter === "FRIENDLIES_ONLY") {
          matchesLeague = m.isFriendly || m.league.toLowerCase().includes('friendly');
        } else if (leagueFilter !== "ALL") {
          matchesLeague = m.league === leagueFilter;
        }

        return matchesSearch && matchesLeague;
      });

      if (sortBy === 'MINUTE_DESC') filtered.sort((a,b) => b.elapsed - a.elapsed);
      if (sortBy === 'MINUTE_ASC') filtered.sort((a,b) => a.elapsed - b.elapsed);
      if (sortBy === 'ODDS_DESC') filtered.sort((a,b) => b.odds - a.odds);

      const tbody = document.getElementById('matchesBody');
      tbody.innerHTML = '';

      let oppCount = 0;

      filtered.forEach(m => {
        if (m.isOpp) oppCount++;

        let oddsClass = 'amber';
        if (m.odds >= 1.15 && m.odds <= 1.20) oddsClass = 'green';
        if (m.odds < 1.10) oddsClass = 'red';

        const row = document.createElement('tr');
        if (m.isOpp) row.className = 'good-opportunity';

        row.innerHTML = `
          <td>
            ${m.league}
            ${m.isFriendly ? '<span class="badge-friendly">Friendly</span>' : ''}
          </td>
          <td>
            <span class="match-team">${m.home} vs ${m.away}</span>
            ${m.isOpp ? '<span class="badge-opp">Good Opportunity</span>' : ''}
          </td>
          <td><strong>${m.homeScore} - ${m.awayScore}</strong></td>
          <td>${m.elapsed}'</td>
          <td><span class="half-tag">${m.elapsed > 45 ? '2nd Half' : '1st Half'}</span></td>
          <td><span class="odds-pill ${oddsClass}">${m.odds.toFixed(2)}</span></td>
          <td>Live</td>
        `;
        tbody.appendChild(row);
      });

      document.getElementById('totalMatches').innerText = matchesData.length;
      document.getElementById('goodOpps').innerText = oppCount;
    }

    async function fetchLiveMatches() {
      if (!activeApiKey) return;

      try {
        const res = await fetch(`https://${RAPIDAPI_HOST}/${ENDPOINT_PATH}`, {
          method: "GET",
          headers: {
            "x-rapidapi-key": activeApiKey,
            "x-rapidapi-host": RAPIDAPI_HOST
          }
        });

        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);

        const json = await res.json();
        const rawData = json.response || json.data || json.result || [];
        const data = Array.isArray(rawData) ? rawData : (rawData.matches || rawData.live || []);

        matchesData = data.map((item, idx) => {
          // Robust multi-schema parsing for minute elapsed
          const elapsed = parseInt(
            item.fixture?.status?.elapsed ?? 
            item.status?.elapsed ?? 
            item.status?.liveTime?.short ?? 
            item.elapsed ?? 0
          ) || 0;

          // Robust multi-schema parsing for scores
          const homeScore = parseInt(
            item.goals?.home ?? 
            item.scores?.home ?? 
            item.home?.score ?? 
            item.scores?.fulltime?.home ?? 0
          ) || 0;

          const awayScore = parseInt(
            item.goals?.away ?? 
            item.scores?.away ?? 
            item.away?.score ?? 
            item.scores?.fulltime?.away ?? 0
          ) || 0;

          // Robust multi-schema parsing for league name
          const leagueName = 
            item.league?.name ?? 
            item.competition?.name ?? 
            item.leagueName ?? 
            "Match";

          // Robust multi-schema parsing for teams
          const homeName = item.teams?.home?.name ?? item.home?.name ?? "Home";
          const awayName = item.teams?.away?.name ?? item.away?.name ?? "Away";

          // Odds calculation with safety fallback
          const rawOdds = item.odds?.over05 ?? (1.05 + (elapsed * 0.0035));
          const odds = parseFloat(parseFloat(rawOdds).toFixed(2));

          const isScoreless = (homeScore === 0) && (awayScore === 0);
          const isTimeWindow = elapsed >= 15 && elapsed <= 35;
          const isOddsTarget = odds >= 1.15 && odds <= 1.20;

          // Regex matching for all friendly formats
          const isFriendly = /friendly|exhibition|tour|club match/i.test(leagueName);

          return {
            id: item.fixture?.id || item.id || idx,
            league: leagueName,
            home: homeName,
            away: awayName,
            homeScore: homeScore,
            awayScore: awayScore,
            elapsed: elapsed,
            odds: odds,
            isOpp: isScoreless && isTimeWindow && isOddsTarget,
            isFriendly: isFriendly
          };
        });

        populateLeagues();
        renderTable();
      } catch (err) {
        console.error("Fetch error:", err);
      }
    }

    function connectAPI() {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (!key) {
        alert("Please enter a valid RapidAPI Key");
        return;
      }
      activeApiKey = key;
      document.getElementById('modeBadge').innerText = "Mode: Live API Connected";
      document.getElementById('modeBadge').style.color = "#10b981";
      fetchLiveMatches();
    }

    // Auto Refresh live data every 5 minutes (300000 ms)
    setInterval(() => {
      if (activeApiKey) fetchLiveMatches();
    }, 300000);

    // Initial load for demo display
    populateLeagues();
    renderTable();
  </script>
</body>
</html>
